# Datasource configuration
# In dev/test mode, Quarkus Dev Services automatically starts a PostgreSQL
# container using Testcontainers — no manual config needed!
quarkus.datasource.db-kind=postgresql

# Hibernate ORM: drop-and-create on every start for demo purposes
quarkus.hibernate-orm.database.generation=drop-and-create

# Seed data loaded from import.sql
quarkus.hibernate-orm.sql-load-script=import.sql