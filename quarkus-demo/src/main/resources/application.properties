# Datasource configuration
# In dev/test mode, Quarkus Dev Services automatically starts a PostgreSQL
# container using Testcontainers — no manual config needed!
quarkus.datasource.db-kind=postgresql

# Hibernate ORM: validate schema against Flyway-managed tables
quarkus.hibernate-orm.database.generation=none

# Flyway migrations
quarkus.flyway.migrate-at-start=true

# Kafka messaging
mp.messaging.outgoing.fruit-events-out.connector=smallrye-kafka
mp.messaging.outgoing.fruit-events-out.topic=fruit-events
mp.messaging.outgoing.fruit-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.fruit-events-in.connector=smallrye-kafka
mp.messaging.incoming.fruit-events-in.topic=fruit-events
mp.messaging.incoming.fruit-events-in.auto.offset.reset=earliest
mp.messaging.incoming.fruit-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# REST client for external nutrition API
quarkus.rest-client.nutrition-api.url=http://localhost:8081
quarkus.rest-client.nutrition-api.scope=jakarta.enterprise.context.ApplicationScoped